<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M + L oo</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #ff4b5c, #ff1e56);
    }
    #webgl {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="webgl"></canvas>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <script>
    const canvas = document.getElementById('webgl');

    const renderer = new THREE.WebGLRenderer({
      canvas,
      alpha: true,
      antialias: true,
      powerPreference: 'high-performance'
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    renderer.setSize(window.innerWidth, window.innerHeight);

    const scene = new THREE.Scene();

    const camera = new THREE.OrthographicCamera(
      window.innerWidth / -2,
      window.innerWidth / 2,
      window.innerHeight / 2,
      window.innerHeight / -2,
      1,
      4000
    );
    camera.position.z = 2000;

    scene.add(new THREE.AmbientLight(0xffffff, 1.0));

    const wait = (ms) => new Promise((r) => setTimeout(r, ms));
    const TEXTS = ["FOR MY BEAUTIFUL ING", "I LOVE YOU SO MUCH"];

    let pageVisible = !document.hidden;

    function getResponsiveConfig() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const minSide = Math.min(w, h);

      if (w <= 640) {
        return {
          textCanvasW: 900,
          textCanvasH: 220,
          textFontPx: 42,
          textStep: 7,
          textMaxParticles: 3800,
          textScale: 0.66,
          imageMaxSide: Math.min(340, minSide * 0.86),
          imageStep: 6,
          imageMaxParticles: 4200,
          imageScale: 1.05,
          sizeMultiplierMin: 2.1,
          sizeMultiplierMax: 3.3,
          pointPerspectiveFactor: 440.0
        };
      }

      if (w <= 1024) {
        return {
          textCanvasW: 1200,
          textCanvasH: 300,
          textFontPx: 96,
          textStep: 6,
          textMaxParticles: 5600,
          textScale: 0.78,
          imageMaxSide: Math.min(470, minSide * 0.88),
          imageStep: 5,
          imageMaxParticles: 6200,
          imageScale: 1.2,
          sizeMultiplierMin: 2.6,
          sizeMultiplierMax: 4.0,
          pointPerspectiveFactor: 480.0
        };
      }

      return {
        textCanvasW: 1500,
        textCanvasH: 360,
        textFontPx: 124,
        textStep: 5,
        textMaxParticles: 7000,
        textScale: 0.9,
        imageMaxSide: 600,
        imageStep: 4,
        imageMaxParticles: 9000,
        imageScale: 1.35,
        sizeMultiplierMin: 3.2,
        sizeMultiplierMax: 4.8,
        pointPerspectiveFactor: 520.0
      };
    }

    let responsiveConfig = getResponsiveConfig();
    document.addEventListener('visibilitychange', () => {
      pageVisible = !document.hidden;
    });

    window.addEventListener('resize', () => {
      camera.left = window.innerWidth / -2;
      camera.right = window.innerWidth / 2;
      camera.top = window.innerHeight / 2;
      camera.bottom = window.innerHeight / -2;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      responsiveConfig = getResponsiveConfig();
    });

    function randomRange(min, max) {
      return min + Math.random() * (max - min);
    }

    function makeRenderTexture(drawFn, width, height) {
      const cnv = document.createElement('canvas');
      cnv.width = width;
      cnv.height = height;
      const ctx = cnv.getContext('2d');
      drawFn(ctx, width, height);
      return { canvas: cnv, ctx };
    }

    function makeTextCanvas(text, w, h, fontPx) {
      return makeRenderTexture((ctx, width, height) => {
        ctx.clearRect(0, 0, width, height);
        ctx.font = `700 ${fontPx}px Roboto, Arial, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#ffffff';
        ctx.shadowColor = 'rgba(0,0,0,0.25)';
        ctx.shadowBlur = 16;
        ctx.fillText(text, width / 2, height / 2);
      }, w, h);
    }

    function loadImageCanvas(src, maxW = 520, maxH = 520) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          const ratio = Math.min(maxW / img.width, maxH / img.height, 1);
          const w = Math.max(1, Math.floor(img.width * ratio));
          const h = Math.max(1, Math.floor(img.height * ratio));

          const data = makeRenderTexture((ctx) => {
            ctx.clearRect(0, 0, w, h);
            ctx.drawImage(img, 0, 0, w, h);
          }, w, h);

          resolve(data);
        };
        img.onerror = reject;
        img.src = src;
      });
    }

    function buildParticleObjectFromCanvas(srcCanvas, opts = {}) {
      const step = opts.step ?? 6;
      const alphaMin = opts.alphaMin ?? 16;
      const spreadZ = opts.spreadZ ?? 12;
      const maxParticles = opts.maxParticles ?? 4500;
      const scale = opts.scale ?? 1.0;
      const colorBoost = opts.colorBoost ?? 1.0;

      const width = srcCanvas.width;
      const height = srcCanvas.height;

      const off = document.createElement('canvas');
      off.width = width;
      off.height = height;
      const offCtx = off.getContext('2d');
      offCtx.drawImage(srcCanvas, 0, 0);

      const data = offCtx.getImageData(0, 0, width, height).data;

      const positions = [];
      const colors = [];
      const sizes = [];
      const home = [];

      let count = 0;
      for (let y = 0; y < height; y += step) {
        for (let x = 0; x < width; x += step) {
          const idx = (y * width + x) * 4;
          const a = data[idx + 3];
          if (a < alphaMin) continue;

          const r = Math.min(255, data[idx] * colorBoost);
          const g = Math.min(255, data[idx + 1] * colorBoost);
          const b = Math.min(255, data[idx + 2] * colorBoost);

          const wx = (x - width / 2) * scale;
          const wy = (height / 2 - y) * scale;
          const wz = randomRange(-spreadZ, spreadZ);

          positions.push(wx, wy, wz);
          home.push(wx, wy, wz);

          colors.push(r / 255, g / 255, b / 255);
          sizes.push(step * scale * randomRange(5, 7));

          count++;
          if (count >= maxParticles) break;
        }
        if (count >= maxParticles) break;
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
      geometry.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));

      const material = new THREE.ShaderMaterial({
        transparent: true,
        depthTest: true,
        depthWrite: false,
        vertexColors: true,
        blending: THREE.AdditiveBlending,
        uniforms: {
          uPixelRatio: { value: Math.min(window.devicePixelRatio, 1.5) }
        },
        vertexShader: `
          uniform float uPixelRatio;
          attribute float size;
          varying vec3 vColor;
          void main() {
            vColor = color;
            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            gl_PointSize = size * uPixelRatio * (${responsiveConfig.pointPerspectiveFactor.toFixed(1)} / -mvPosition.z);
            gl_Position = projectionMatrix * mvPosition;
          }
        `,
        fragmentShader: `
          varying vec3 vColor;
          void main() {
            vec2 c = gl_PointCoord - vec2(0.5);
            float d = length(c);
            if (d > 0.5) discard;
            float alpha = smoothstep(0.5, 0.05, d);
            gl_FragColor = vec4(vColor, alpha);
          }
        `
      });

      const points = new THREE.Points(geometry, material);
      points.userData.home = home.slice();

      return points;
    }

    function animateIntegrate(points, duration = 1.1) {
      const pos = points.geometry.attributes.position.array;
      const home = points.userData.home;
      const state = { t: 0 };

      const start = new Float32Array(pos.length);
      for (let i = 0; i < pos.length; i += 3) {
        start[i] = home[i] + randomRange(-320, 320);
        start[i + 1] = home[i + 1] + randomRange(-320, 320);
        start[i + 2] = home[i + 2] + randomRange(-420, 420);
      }

      return new Promise((resolve) => {
        gsap.to(state, {
          t: 1,
          duration,
          ease: 'power3.out',
          onUpdate: () => {
            const t = state.t;
            for (let i = 0; i < pos.length; i += 3) {
              pos[i] = start[i] + (home[i] - start[i]) * t;
              pos[i + 1] = start[i + 1] + (home[i + 1] - start[i + 1]) * t;
              pos[i + 2] = start[i + 2] + (home[i + 2] - start[i + 2]) * t;
            }
            points.geometry.attributes.position.needsUpdate = true;
          },
          onComplete: resolve
        });
      });
    }

    function animateDisintegrate(points, duration = 1.0) {
      const pos = points.geometry.attributes.position.array;
      const home = points.userData.home;
      const state = { t: 0 };

      const end = new Float32Array(pos.length);
      for (let i = 0; i < pos.length; i += 3) {
        end[i] = home[i] + randomRange(-520, 520);
        end[i + 1] = home[i + 1] + randomRange(-480, 480);
        end[i + 2] = home[i + 2] + randomRange(-700, 700);
      }

      return new Promise((resolve) => {
        gsap.to(state, {
          t: 1,
          duration,
          ease: 'power2.in',
          onUpdate: () => {
            const t = state.t;
            for (let i = 0; i < pos.length; i += 3) {
              pos[i] = home[i] + (end[i] - home[i]) * t;
              pos[i + 1] = home[i + 1] + (end[i + 1] - home[i + 1]) * t;
              pos[i + 2] = home[i + 2] + (end[i + 2] - home[i + 2]) * t;
            }
            points.geometry.attributes.position.needsUpdate = true;
            points.material.opacity = 1 - t;
          },
          onComplete: resolve
        });
      });
    }

    function destroyPoints(points) {
      scene.remove(points);
      points.geometry.dispose();
      points.material.dispose();
    }

    async function playPoints(points) {
      scene.add(points);
      points.material.opacity = 1;

      await animateIntegrate(points, 1.15);
      await wait(850);
      await animateDisintegrate(points, 1.05);

      destroyPoints(points);
    }

    function renderLoop() {
      requestAnimationFrame(renderLoop);
      renderer.render(scene, camera);
    }
    renderLoop();

    async function run() {
      const img1Canvas = await loadImageCanvas('image1.png', responsiveConfig.imageMaxSide, responsiveConfig.imageMaxSide);
      const img2Canvas = await loadImageCanvas('image2.png', responsiveConfig.imageMaxSide, responsiveConfig.imageMaxSide);

      while (true) {
        if (!pageVisible) {
          await wait(250);
          continue;
        }

        responsiveConfig = getResponsiveConfig();

        const t1 = makeTextCanvas(
          TEXTS[0],
          responsiveConfig.textCanvasW,
          responsiveConfig.textCanvasH,
          responsiveConfig.textFontPx
        );
        const pText1 = buildParticleObjectFromCanvas(t1.canvas, {
          step: responsiveConfig.textStep,
          alphaMin: 20,
          maxParticles: responsiveConfig.textMaxParticles,
          spreadZ: 26,
          scale: responsiveConfig.textScale
        });
        await playPoints(pText1);
        await wait(220);

        const pImg1 = buildParticleObjectFromCanvas(img1Canvas.canvas, {
          step: responsiveConfig.imageStep,
          alphaMin: 12,
          maxParticles: responsiveConfig.imageMaxParticles,
          spreadZ: 20,
          scale: responsiveConfig.imageScale
        });
        await playPoints(pImg1);
        await wait(220);

        const t2 = makeTextCanvas(
          TEXTS[1],
          responsiveConfig.textCanvasW,
          responsiveConfig.textCanvasH,
          responsiveConfig.textFontPx
        );
        const pText2 = buildParticleObjectFromCanvas(t2.canvas, {
          step: responsiveConfig.textStep,
          alphaMin: 20,
          maxParticles: responsiveConfig.textMaxParticles,
          spreadZ: 26,
          scale: responsiveConfig.textScale
        });
        await playPoints(pText2);
        await wait(220);

        const pImg2 = buildParticleObjectFromCanvas(img2Canvas.canvas, {
          step: responsiveConfig.imageStep,
          alphaMin: 12,
          maxParticles: responsiveConfig.imageMaxParticles,
          spreadZ: 20,
          scale: responsiveConfig.imageScale
        });
        await playPoints(pImg2);
        await wait(220);
      }
    }

    window.addEventListener('load', () => {
      run().catch((err) => console.error(err));
    });
  </script>
</body>
</html>
