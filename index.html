<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M + L oo</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #ff4b5c, #ff1e56);
    }

    #webgl {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      display: block;
    }

    /* ocultas, solo para cargar recursos */
    #img1, #img2 {
      position: fixed;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
      left: -9999px;
      top: -9999px;
    }
  </style>
</head>
<body>
  <canvas id="webgl"></canvas>
  <img id="img1" src="image1.png" alt="image1" />
  <img id="img2" src="image2.png" alt="image2" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <script>
    const canvas = document.getElementById('webgl');

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2500);
    camera.position.z = 520;

    const renderer = new THREE.WebGLRenderer({
      canvas,
      alpha: true,
      antialias: true,
      powerPreference: 'high-performance'
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    renderer.setSize(window.innerWidth, window.innerHeight);

    scene.add(new THREE.AmbientLight(0xffffff, 1.15));
    const dir = new THREE.DirectionalLight(0xffffff, 0.6);
    dir.position.set(0.3, 1, 1);
    scene.add(dir);

    let currentGroup = null;
    let busy = false;
    let pageVisible = !document.hidden;

    const TEXTS = ["FOR MY BEAUTIFUL ING", "I LOVE YOU SO MUCH"];
    const wait = (ms) => new Promise(r => setTimeout(r, ms));

    document.addEventListener('visibilitychange', () => {
      pageVisible = !document.hidden;
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function randomRange(min, max) {
      return min + Math.random() * (max - min);
    }

    function clearCurrentGroup() {
      if (!currentGroup) return;
      scene.remove(currentGroup);
      currentGroup.traverse(obj => {
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) obj.material.dispose();
      });
      currentGroup = null;
    }

    function createVoxelLetter(char, xOffset) {
      const group = new THREE.Group();
      const size = 4.2;
      const depth = 3.2;
      const cols = 5;
      const rows = 7;
      const gap = 0.9;

      const mat = new THREE.MeshStandardMaterial({
        color: 0xffffff,
        roughness: 0.3,
        metalness: 0.45,
        transparent: true,
        opacity: 1
      });

      const geo = new THREE.BoxGeometry(size, size, depth);

      // patrón pseudo tipográfico por letra (determinístico simple)
      const seed = char.charCodeAt(0) || 65;
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const v = ((x * 17 + y * 31 + seed * 13) % 100);
          const keep = y === 0 || y === rows - 1 || x === 0 || x === cols - 1 || v > 55;
          if (!keep) continue;
          if (Math.random() < 0.12) continue;

          const cube = new THREE.Mesh(geo, mat.clone());
          cube.position.set(
            xOffset + (x - (cols - 1) / 2) * (size + gap),
            ((rows - 1) / 2 - y) * (size + gap),
            randomRange(-1.8, 1.8)
          );
          cube.userData.home = cube.position.clone();
          group.add(cube);
        }
      }
      return group;
    }

    function createTextGroup(text) {
      const group = new THREE.Group();
      const letterAdvance = 30;
      const startX = -((text.length - 1) * letterAdvance) / 2;

      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        if (ch === ' ') continue;
        const letter = createVoxelLetter(ch, startX + i * letterAdvance);
        group.add(letter);
      }

      return group;
    }

    function createImageGroup(imgEl) {
      const texture = new THREE.TextureLoader().load(imgEl.src);
      const planeW = 280;
      const planeH = 280;
      const cols = 28;
      const rows = 28;
      const pieceW = planeW / cols;
      const pieceH = planeH / rows;

      const group = new THREE.Group();

      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          if (Math.random() < 0.2) continue;

          const geo = new THREE.PlaneGeometry(pieceW, pieceH);
          const mat = new THREE.MeshBasicMaterial({
            map: texture,
            transparent: true,
            side: THREE.DoubleSide
          });

          mat.map.repeat.set(1 / cols, 1 / rows);
          mat.map.offset.set(x / cols, 1 - (y + 1) / rows);

          const mesh = new THREE.Mesh(geo, mat);
          mesh.position.set(
            -planeW / 2 + x * pieceW + pieceW / 2,
            planeH / 2 - y * pieceH - pieceH / 2,
            0
          );
          mesh.userData.home = mesh.position.clone();
          group.add(mesh);
        }
      }

      return group;
    }

    function getAllPieces(group) {
      const pieces = [];
      group.traverse(obj => {
        if (obj.isMesh) pieces.push(obj);
      });
      return pieces;
    }

    async function integrateGroup(group) {
      const pieces = getAllPieces(group);

      pieces.forEach((piece, i) => {
        piece.material.opacity = 0;
        piece.position.x = piece.userData.home.x + randomRange(-170, 170);
        piece.position.y = piece.userData.home.y + randomRange(-170, 170);
        piece.position.z = piece.userData.home.z + randomRange(-180, 180);
        piece.rotation.set(randomRange(-3.2, 3.2), randomRange(-3.2, 3.2), randomRange(-3.2, 3.2));

        gsap.to(piece.position, {
          x: piece.userData.home.x,
          y: piece.userData.home.y,
          z: piece.userData.home.z,
          duration: 1.15,
          delay: i * 0.0009,
          ease: 'power3.out'
        });

        gsap.to(piece.rotation, {
          x: 0, y: 0, z: 0,
          duration: 1.05,
          delay: i * 0.0009,
          ease: 'power2.out'
        });

        gsap.to(piece.material, {
          opacity: 1,
          duration: 0.7,
          delay: i * 0.0009,
          ease: 'power2.out'
        });
      });

      await wait(1280);
    }

    async function disintegrateGroup(group) {
      const pieces = getAllPieces(group);

      pieces.forEach((piece, i) => {
        gsap.to(piece.position, {
          x: piece.userData.home.x + randomRange(-320, 320),
          y: piece.userData.home.y + randomRange(-280, 280),
          z: piece.userData.home.z + randomRange(-320, 320),
          duration: 1.02,
          delay: i * 0.0009,
          ease: 'power2.in'
        });

        gsap.to(piece.rotation, {
          x: randomRange(-5, 5),
          y: randomRange(-5, 5),
          z: randomRange(-5, 5),
          duration: 1.02,
          delay: i * 0.0009,
          ease: 'power2.in'
        });

        gsap.to(piece.material, {
          opacity: 0,
          duration: 0.86,
          delay: i * 0.0009,
          ease: 'power1.in'
        });
      });

      await wait(1130);
    }

    async function playText(text) {
      if (busy) return;
      busy = true;
      clearCurrentGroup();

      const group = createTextGroup(text);
      currentGroup = group;
      scene.add(group);

      await integrateGroup(group);
      await wait(850);
      await disintegrateGroup(group);

      busy = false;
    }

    async function playImage(imgEl) {
      if (busy) return;
      busy = true;
      clearCurrentGroup();

      const group = createImageGroup(imgEl);
      currentGroup = group;
      scene.add(group);

      await integrateGroup(group);
      await wait(850);
      await disintegrateGroup(group);

      busy = false;
    }

    function animate() {
      requestAnimationFrame(animate);

      if (currentGroup) {
        currentGroup.rotation.y += 0.0017;
        currentGroup.rotation.x += 0.0005;
      }

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('load', async () => {
      const img1 = document.getElementById('img1');
      const img2 = document.getElementById('img2');

      // Precalienta texturas para evitar “pantalla en blanco” inicial
      new THREE.TextureLoader().load(img1.src, () => {});
      new THREE.TextureLoader().load(img2.src, () => {});

      while (true) {
        if (!pageVisible) {
          await wait(250);
          continue;
        }

        await playText(TEXTS[0]);
        await wait(220);

        await playImage(img1);
        await wait(220);

        await playText(TEXTS[1]);
        await wait(220);

        await playImage(img2);
        await wait(220);
      }
    });
  </script>
</body>
</html>
